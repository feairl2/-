<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>SHADOW_KERNEL // SCRYPT-X</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050505;
    --panel:#0a0a0a;
    --border:#151515;
    --text:#888;
    --accent:#ffffff;
}

body{
    background:var(--bg);
    font-family:'JetBrains Mono',monospace;
    overflow:hidden;
    color:var(--text);
}

.panel{
    background:rgba(10,10,10,0.9);
    border:1px solid var(--border);
    backdrop-filter:blur(20px);
}

textarea{
    background:transparent!important;
    color:#aaa;
    border:none;
    outline:none;
    resize:none;
    font-size:11px;
}

.btn{
    background:var(--accent);
    color:black;
    font-weight:900;
    transition:0.3s;
    cursor:pointer;
}

.btn:hover{
    letter-spacing:0.2em;
    filter:invert(1);
}

.log{
    font-size:10px;
    color:#333;
    border-left:1px solid #111;
    padding-left:10px;
    overflow-y:auto;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div class="max-w-6xl w-full grid grid-cols-12 gap-4">

<div class="col-span-12 flex justify-between border-b border-zinc-900 pb-4">
    <h1 class="text-white tracking-[0.8em] text-xl font-bold">SHADOW_KERNEL_X</h1>
    <div class="text-[10px] opacity-30">AES-256 / OBFUSCATION_LAYER</div>
</div>

<div class="col-span-12 lg:col-span-9 panel rounded-3xl p-6 h-[520px] flex flex-col">
    <textarea id="input" class="flex-grow w-full" placeholder="[INPUT OR ENCRYPTED HTML]"></textarea>
</div>

<div class="col-span-12 lg:col-span-3 flex flex-col gap-4">

    <div class="panel rounded-3xl p-6 flex flex-col gap-4">
        <button onclick="encrypt()" class="btn py-5 rounded-xl text-[11px] uppercase">Compile</button>
        <button onclick="decrypt()" class="btn py-5 rounded-xl text-[11px] uppercase">Decompile</button>
    </div>

    <div id="log" class="panel rounded-3xl p-4 h-40 log">
        SYSTEM_READY...<br>
    </div>

</div>
</div>

<script>
const enc = new TextEncoder();
const dec = new TextDecoder();

const log = (t) => {
    const el = document.getElementById("log");
    el.innerHTML = "> " + t + "<br>" + el.innerHTML;
};

const OFFSET = Math.floor(Math.random() * 2000) + 300;

const pack = (u) => {
    return OFFSET + "|" + Array.from(u)
        .map((b,i)=>String.fromCharCode(b + OFFSET + (i % 7)))
        .join('');
};

const unpack = (s) => {
    const [off, data] = s.split("|");
    const offset = parseInt(off);

    return new Uint8Array([...data]
        .map((c,i)=>c.charCodeAt(0) - offset - (i % 7)));
};

async function encrypt(){

    const minify = (html) => {
    return html
        .replace(/\r/g,'')
        .replace(/\n/g,'');
};

    const raw = document.getElementById("input").value;
    if(!raw) return log("NULL_INPUT");

    log("BUILDING_KERNEL...");

    try{

        const compressed = minify(raw);

        const key = await crypto.subtle.generateKey(
            {name:"AES-GCM", length:256},
            true,
            ["encrypt","decrypt"]
        );

        const iv = crypto.getRandomValues(new Uint8Array(12));

        const shell = `(function(){
const div=document.createElement("div");
div.innerHTML=\`${compressed
    .replace(/\\/g,'\\\\')
    .replace(/`/g,'\\`')
    .replace(/\$/g,'\\$')}\`;

document.body.innerHTML="";
document.body.appendChild(div);

div.querySelectorAll("script").forEach(s=>{
    const ns=document.createElement("script");
    ns.textContent=s.textContent;
    document.body.appendChild(ns);
});
})();`;

        const encrypted = await crypto.subtle.encrypt(
            {name:"AES-GCM", iv},
            key,
            enc.encode(shell)
        );

        const rawKey = await crypto.subtle.exportKey("raw", key);

        const _K = pack(new Uint8Array(rawKey));
        const _I = pack(iv);
        const _D = pack(new Uint8Array(encrypted));

        const result = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><script>
(function(){

document.addEventListener("keydown", e => {
    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) ||
        (e.ctrlKey && e.key === "U")
    ) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }
});

const unpack=(s)=>{
const [off,data]=s.split("|");
const offset=parseInt(off);
return new Uint8Array([...data].map((c,i)=>c.charCodeAt(0)-offset-(i%7)));
};

(async()=>{
try{
const _0x91=unpack("${_K}");
const _0xA2=unpack("${_I}");
const _0xF3=unpack("${_D}");

const sk=await crypto.subtle.importKey("raw",_0x91,"AES-GCM",false,["decrypt"]);
const r=await crypto.subtle.decrypt({name:"AES-GCM",iv:_0xA2},sk,_0xF3);

const code=new TextDecoder().decode(r);
(function(f){f();})(new Function(code));

}catch(e){
console.error("DECRYPT_FAIL",e);
}
})();
})();
<\/script></body></html>`;

        const final = result
    .replace(/\n/g,'')
    .replace(/\t/g,'')
    .replace(/\s{2,}/g,' ')
    .replace(/>\s+</g,'><')
    .trim();

await navigator.clipboard.writeText(final);

        log("COMPILE_SUCCESS");
        log("COPIED");

    }catch(e){
        console.error(e);
        log("KERNEL_ERROR");
    }
}
async function decrypt(){
    const input = document.getElementById("input").value;

    if(!input.includes("_0x91=unpack(")) return log("INVALID_FORMAT");

    log("DECOMPILING...");

    try{
        const extract = (name) => {
            const match = input.match(new RegExp(name + '=unpack\\("([^"]+)"\\)'));
            return match ? match[1] : null;
        };

        const keyStr = extract("_0x91");
        const ivStr = extract("_0xA2");
        const dataStr = extract("_0xF3");

        if(!keyStr || !ivStr || !dataStr){
            return log("PARSE_FAIL");
        }

        const k = unpack(keyStr);
        const iv = unpack(ivStr);
        const d = unpack(dataStr);

        const sk = await crypto.subtle.importKey("raw", k, "AES-GCM", false, ["decrypt"]);
        const res = await crypto.subtle.decrypt({name:"AES-GCM", iv}, sk, d);

        const decoded = dec.decode(res);

        const match = decoded.match(/document\.write\(`([\s\S]*)`\)/);

        if(match){
            document.getElementById("input").value = match[1];
        }else{
            document.getElementById("input").value = decoded;
        }

        log("DECOMPILE_SUCCESS");

    }catch(e){
        console.error(e);
        log("DECOMPILE_FAIL");
    }
}
</script>

</body>
</html>
