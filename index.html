<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>SHADOW_KERNEL // SCRYPT-X</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050505;
    --panel:#0a0a0a;
    --border:#151515;
    --text:#888;
    --accent:#ffffff;
}

body{
    background:var(--bg);
    font-family:'JetBrains Mono',monospace;
    overflow:hidden;
    color:var(--text);
}

.panel{
    background:rgba(10,10,10,0.9);
    border:1px solid var(--border);
    backdrop-filter:blur(20px);
}

textarea{
    background:transparent!important;
    color:#aaa;
    border:none;
    outline:none;
    resize:none;
    font-size:11px;
}

.btn{
    background:var(--accent);
    color:black;
    font-weight:900;
    transition:0.3s;
    cursor:pointer;
}

.btn:hover{
    letter-spacing:0.2em;
    filter:invert(1);
}

.log{
    font-size:10px;
    color:#333;
    border-left:1px solid #111;
    padding-left:10px;
    overflow-y:auto;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div class="max-w-6xl w-full grid grid-cols-12 gap-4">

<div class="col-span-12 flex justify-between border-b border-zinc-900 pb-4">
    <h1 class="text-white tracking-[0.8em] text-xl font-bold">SHADOW_KERNEL_X</h1>
    <div class="text-[10px] opacity-30">AES-256 / OBFUSCATION_LAYER</div>
</div>

<div class="col-span-12 lg:col-span-9 panel rounded-3xl p-6 h-[520px] flex flex-col">
    <textarea id="input" class="flex-grow w-full" placeholder="[INPUT OR ENCRYPTED HTML]"></textarea>
</div>

<div class="col-span-12 lg:col-span-3 flex flex-col gap-4">

    <div class="panel rounded-3xl p-6 flex flex-col gap-4">
        <button onclick="encrypt()" class="btn py-5 rounded-xl text-[11px] uppercase">Compile</button>
        <button onclick="decrypt()" class="btn py-5 rounded-xl text-[11px] uppercase">Decompile</button>
    </div>

    <div id="log" class="panel rounded-3xl p-4 h-40 log">
        SYSTEM_READY...<br>
    </div>

</div>
</div>

<script>
const enc=new TextEncoder();
const dec=new TextDecoder();

const log=(t)=>{
    const el=document.getElementById("log");
    el.innerHTML="> "+t+"<br>"+el.innerHTML;
};

/* ===== 偏移加密（保持你那種殼） ===== */
const pack=(u)=>Array.from(u).map(b=>String.fromCharCode(b+0x0800)).join('');
const unpack=(s)=>new Uint8Array([...s].map(c=>c.charCodeAt(0)-(0x07FF+0x01)));

/* ================= ENCRYPT ================= */
async function encrypt(){
    const raw=document.getElementById("input").value;
    if(!raw) return log("NULL_INPUT");

    log("BUILDING_KERNEL...");

    try{
        const key=await crypto.subtle.generateKey({name:"AES-GCM",length:256},true,["encrypt","decrypt"]);
        const iv=crypto.getRandomValues(new Uint8Array(12));

        const shell=`(function(){document.open();document.write(\`${raw.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`);document.close();})();`;

        const data=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,enc.encode(shell));
        const rawKey=await crypto.subtle.exportKey("raw",key);

        const _K=pack(new Uint8Array(rawKey));
        const _I=pack(iv);
        const _D=pack(new Uint8Array(data));

        const res=`<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><script>
(function(){
const _0x=(s)=>new Uint8Array([...s].map(c=>c.charCodeAt(0)-(0x07FF+0x01)));
(async()=>{
try{
const k=_0x("${_K}");
const i=_0x("${_I}");
const d=_0x("${_D}");

const sk=await crypto.subtle.importKey("raw",k,"AES-GCM",false,["decrypt"]);
const r=await crypto.subtle.decrypt({name:"AES-GCM",iv:i},sk,d);

new Function(new TextDecoder().decode(r))();

}catch(e){}
})();
})();
<\/script></body></html>`;

        await navigator.clipboard.writeText(res);

        log("COMPILE_SUCCESS");
        log("COPIED");

    }catch(e){
        log("KERNEL_ERROR");
    }
}

/* ================= DECRYPT ================= */
async function decrypt(){
    const input=document.getElementById("input").value;

    if(!input.includes("_0x")) return log("INVALID_FORMAT");

    log("DECOMPILING...");

    try{
        const get=(r)=>input.match(r)?.[1];

        const keyStr=get(/k=_0x\("([^"]+)"\)/);
        const ivStr=get(/i=_0x\("([^"]+)"\)/);
        const dataStr=get(/d=_0x\("([^"]+)"\)/);

        if(!keyStr) return log("PARSE_FAIL");

        const k=unpack(keyStr);
        const iv=unpack(ivStr);
        const d=unpack(dataStr);

        const sk=await crypto.subtle.importKey("raw",k,"AES-GCM",false,["decrypt"]);
        const res=await crypto.subtle.decrypt({name:"AES-GCM",iv},sk,d);

        document.getElementById("input").value=dec.decode(res);

        log("DECOMPILE_SUCCESS");

    }catch(e){
        log("DECOMPILE_FAIL");
    }
}
</script>

</body>
</html>
