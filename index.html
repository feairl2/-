<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>SHADOW_KERNEL // SCRYPT-X</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050505;
    --panel:#0a0a0a;
    --border:#151515;
    --text:#888;
    --accent:#ffffff;
}

body{
    background:var(--bg);
    font-family:'JetBrains Mono',monospace;
    overflow:hidden;
    color:var(--text);
}

.panel{
    background:rgba(10,10,10,0.9);
    border:1px solid var(--border);
    backdrop-filter:blur(20px);
}

textarea{
    background:transparent!important;
    color:#aaa;
    border:none;
    outline:none;
    resize:none;
    font-size:11px;
}

.btn{
    background:var(--accent);
    color:black;
    font-weight:900;
    transition:0.3s;
    cursor:pointer;
}

.btn:hover{
    letter-spacing:0.2em;
    filter:invert(1);
}

.log{
    font-size:10px;
    color:#333;
    border-left:1px solid #111;
    padding-left:10px;
    overflow-y:auto;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div class="max-w-6xl w-full grid grid-cols-12 gap-4">

<div class="col-span-12 flex justify-between border-b border-zinc-900 pb-4">
    <h1 class="text-white tracking-[0.8em] text-xl font-bold">SHADOW_KERNEL_X</h1>
    <div class="text-[10px] opacity-30">AES-256 / OBFUSCATION_LAYER</div>
</div>

<div class="col-span-12 lg:col-span-9 panel rounded-3xl p-6 h-[520px] flex flex-col">
    <textarea id="input" class="flex-grow w-full" placeholder="[INPUT OR ENCRYPTED HTML]"></textarea>
</div>

<div class="col-span-12 lg:col-span-3 flex flex-col gap-4">

    <div class="panel rounded-3xl p-6 flex flex-col gap-4">
        <button onclick="encrypt()" class="btn py-5 rounded-xl text-[11px] uppercase">Compile</button>
        <button onclick="decrypt()" class="btn py-5 rounded-xl text-[11px] uppercase">Decompile</button>
    </div>

    <div id="log" class="panel rounded-3xl p-4 h-40 log">
        SYSTEM_READY...<br>
    </div>

</div>
</div>

<script>
const enc = new TextEncoder();
const dec = new TextDecoder();

const log = (t) => {
    const el = document.getElementById("log");
    el.innerHTML = "> " + t + "<br>" + el.innerHTML;
};

/* 🔥 修復版 pack / unpack（完全對稱） */
const pack = (u) => {
    return Array.from(u).map(b => String.fromCharCode(b + 0x0100)).join('');
};

const unpack = (s) => {
    return new Uint8Array([...s].map(c => c.charCodeAt(0) - 0x0100));
};

/* ================= ENCRYPT ================= */
async function encrypt(){
    const raw = document.getElementById("input").value;
    if(!raw) return log("NULL_INPUT");

    log("BUILDING_KERNEL...");

    try{
        const key = await crypto.subtle.generateKey(
            {name:"AES-GCM", length:256},
            true,
            ["encrypt","decrypt"]
        );

        const iv = crypto.getRandomValues(new Uint8Array(12));

        const shell = `(function(){document.open();document.write(\`${raw
            .replace(/\\/g,'\\\\')
            .replace(/`/g,'\\`')
            .replace(/\$/g,'\\$')}\`);document.close();})();`;

        const encrypted = await crypto.subtle.encrypt(
            {name:"AES-GCM", iv},
            key,
            enc.encode(shell)
        );

        const rawKey = await crypto.subtle.exportKey("raw", key);

        // 🔥 base64 + pack（雙保險）
        const _K = pack(new Uint8Array(rawKey));
        const _I = pack(iv);
        const _D = pack(new Uint8Array(encrypted));

        const result = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><script>
(function(){
const unpack=(s)=>new Uint8Array([...s].map(c=>c.charCodeAt(0)-0x0100));
(async()=>{
try{
const k=unpack("${_K}");
const i=unpack("${_I}");
const d=unpack("${_D}");

const sk=await crypto.subtle.importKey("raw",k,"AES-GCM",false,["decrypt"]);
const r=await crypto.subtle.decrypt({name:"AES-GCM",iv:i},sk,d);

const code=new TextDecoder().decode(r);
(new Function(code))();

}catch(e){
console.error("DECRYPT_FAIL",e);
}
})();
})();
<\/script></body></html>`;

        await navigator.clipboard.writeText(result);

        log("COMPILE_SUCCESS");
        log("COPIED");

    }catch(e){
        console.error(e);
        log("KERNEL_ERROR");
    }
}

/* ================= DECRYPT ================= */
async function decrypt(){
    const input = document.getElementById("input").value;

    if(!input.includes("unpack")) return log("INVALID_FORMAT");

    log("DECOMPILING...");

    try{
        const extract = (name) => {
            const match = input.match(new RegExp(name + '=unpack\\("([^"]+)"\\)'));
            return match ? match[1] : null;
        };

        const keyStr = extract("k");
        const ivStr = extract("i");
        const dataStr = extract("d");

        if(!keyStr || !ivStr || !dataStr){
            return log("PARSE_FAIL");
        }

        const k = unpack(keyStr);
        const iv = unpack(ivStr);
        const d = unpack(dataStr);

        const sk = await crypto.subtle.importKey("raw", k, "AES-GCM", false, ["decrypt"]);
        const res = await crypto.subtle.decrypt({name:"AES-GCM", iv}, sk, d);

        const decoded = dec.decode(res);

        // 🔥 還原 shell → 取出原始 HTML
        const match = decoded.match(/document\.write\(`([\s\S]*)`\)/);

        if(match){
            document.getElementById("input").value = match[1];
        }else{
            document.getElementById("input").value = decoded;
        }

        log("DECOMPILE_SUCCESS");

    }catch(e){
        console.error(e);
        log("DECOMPILE_FAIL");
    }
}
</script>

</body>
</html>
