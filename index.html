<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SCRYPT // SHADOW-KERNEL X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#050505; --panel:#0a0a0a; --border:#151515; --text:#888; --accent:#ffffff; --glow: #0078d4; }
        body { background: var(--bg); font-family: 'JetBrains Mono', monospace; overflow: hidden; color: var(--text); }
        .panel { background: rgba(10,10,10,0.9); border: 1px solid var(--border); backdrop-filter: blur(20px); }
        textarea { background: transparent!important; color: #adbac7; border: none; outline: none; resize: none; font-size: 11px; spellcheck: false; }
        .btn { background: var(--accent); color: black; font-weight: 900; transition: 0.35s; cursor: pointer; border: none; }
        .btn:hover { letter-spacing: 0.2em; filter: invert(1); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .log { font-size: 10px; color: #444; border-left: 1px solid #111; padding-left: 10px; overflow-y: auto; scrollbar-width: none; }
        .log::-webkit-scrollbar { display: none; }
        .badge { font-size: 9px; opacity: 0.4; letter-spacing: 2px; }
        .success { color: #44ff44 !important; }
        .error { color: #ff4444 !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

<div class="max-w-6xl w-full grid grid-cols-12 gap-4">
    <div class="col-span-12 flex justify-between border-b border-zinc-900 pb-4">
        <h1 class="text-white tracking-[0.8em] text-xl font-bold">SHADOW_KERNEL_X</h1>
        <div class="badge">INTEGRATED_ENGINE // AES-256-GCM</div>
    </div>

    <div class="col-span-12 lg:col-span-9 panel rounded-3xl p-6 h-[550px] flex flex-col">
        <div class="flex justify-between mb-2">
            <span class="badge">BUFFER_STREAM</span>
            <span id="char-count" class="badge">0 CHARS</span>
        </div>
        <textarea id="input" class="flex-grow w-full" placeholder="[ 貼入原始 HTML 或 加密後的整份代碼 ]" oninput="updateCount()"></textarea>
    </div>

    <div class="col-span-12 lg:col-span-3 flex flex-col gap-4">
        <div class="panel rounded-3xl p-6 flex flex-col gap-3">
            <div class="badge mb-2">COMMAND_CENTER</div>
            <button onclick="encrypt()" class="btn py-5 rounded-xl text-[11px] uppercase">Compile</button>
            <button onclick="decrypt()" class="btn py-5 rounded-xl text-[11px] uppercase">Decompile</button>
            <button onclick="clearAll()" class="py-2 text-[9px] uppercase hover:text-white transition opacity-30">Clear Buffer</button>
        </div>
        
        <div id="log" class="panel rounded-3xl p-5 h-48 log">
            > SYSTEM_READY...<br>
            > AWAITING_INPUT...<br>
        </div>
    </div>
</div>

<script>
const enc = new TextEncoder();
const dec = new TextDecoder();

const printLog = (msg, type="info") => {
    const el = document.getElementById("log");
    const className = type === "err" ? "error" : type === "ok" ? "success" : "";
    el.innerHTML = `<span class="${className}">> ${msg}</span><br>` + el.innerHTML;
};

const updateCount = () => {
    document.getElementById('char-count').innerText = document.getElementById('input').value.length + " CHARS";
};

const bufToB64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
const b64ToBuf = (str) => Uint8Array.from(atob(str), c => c.charCodeAt(0));

function clearAll() {
    document.getElementById('input').value = "";
    updateCount();
    printLog("BUFFER_CLEARED");
}

/* ================= ENCRYPT (Compile) ================= */
async function encrypt() {
    const raw = document.getElementById('input').value;
    if (!raw) return printLog("NULL_INPUT", "err");

    printLog("INITIALIZING_GCM_PROTOCOL...");

    try {
        const key = await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
        const iv = crypto.getRandomValues(new Uint8Array(12));

        // 封裝 Shell：使用 Base64 防止引號混淆
        const payload = btoa(unescape(encodeURIComponent(raw)));
        const shell = `document.open();document.write(decodeURIComponent(escape(atob("${payload}"))));document.close();`;

        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(shell));
        const exportedKey = await crypto.subtle.exportKey("raw", key);

        const finalResult = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head><body>
<script>
(async()=>{
const _b=(s)=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const k="${bufToB64(exportedKey)}";
const i="${bufToB64(iv)}";
const d="${bufToB64(encrypted)}";
const sk=await crypto.subtle.importKey("raw",_b(k),"AES-GCM",false,["decrypt"]);
const r=await crypto.subtle.decrypt({name:"AES-GCM",iv:_b(i)},sk,_b(d));
new Function(new TextDecoder().decode(r))();
})();
<\/script></body></html>`;

        document.getElementById("input").value = finalResult;
        navigator.clipboard.writeText(finalResult);
        updateCount();
        printLog("ENCRYPT_SUCCESS", "ok");
        printLog("COPIED_TO_CLIPBOARD");
    } catch (e) {
        printLog("ENCRYPT_ERR: " + e.message, "err");
    }
}

/* ================= DECRYPT (Decompile) ================= */
async function decrypt() {
    const input = document.getElementById('input').value;
    if (!input.includes("AES-GCM") && !input.includes("crypto.subtle")) {
        return printLog("INVALID_ENCRYPTED_FORMAT", "err");
    }

    printLog("ATTEMPTING_DECONSTRUCTION...");

    try {
        // 使用強力正則抓取 Base64 字串 (k, i, d)
        // 抓取引號內長度大於 10 的字串
        const matches = input.match(/"[A-Za-z0-9+/=]{10,}"/g);
        
        if (!matches || matches.length < 3) {
            throw new Error("KEY_DATA_NOT_FOUND");
        }

        // 依序提取 (去除引號)
        const kStr = matches[0].replace(/"/g, '');
        const iStr = matches[1].replace(/"/g, '');
        const dStr = matches[2].replace(/"/g, '');

        const sk = await crypto.subtle.importKey("raw", b64ToBuf(kStr), "AES-GCM", false, ["decrypt"]);
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64ToBuf(iStr) }, sk, b64ToBuf(dStr));
        
        let shellCode = dec.decode(decrypted);

        // 剝離 Shell 殼，取出最內層原始 HTML
        const innerMatch = shellCode.match(/atob\("([^"]+)"\)/);
        if (innerMatch) {
            const finalHtml = decodeURIComponent(escape(atob(innerMatch[1])));
            document.getElementById("input").value = finalHtml;
            printLog("FULL_RESTORE_COMPLETE", "ok");
        } else {
            document.getElementById("input").value = shellCode;
            printLog("SHELL_NOT_FOUND_BUT_DECRYPTED", "ok");
        }
        updateCount();
    } catch (e) {
        console.error(e);
        printLog("DECRYPT_FAILED: AUTH_TAG_MISMATCH", "err");
    }
}
</script>
</body>
</html>
