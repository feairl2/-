<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>SCRYPT // SHADOW-KERNEL X</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#050505;
    --panel:#0a0a0a;
    --border:#151515;
    --text:#888;
    --accent:#ffffff;
}

body {
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    color: var(--text);
}

.panel {
    background: rgba(10,10,10,0.9);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
}

textarea {
    background: transparent!important;
    color: #aaa;
    border: none;
    outline: none;
    resize: none;
    font-size: 11px;
}

.btn {
    background: var(--accent);
    color: black;
    font-weight: 900;
    transition: 0.35s;
    cursor: pointer;
}

.btn:hover {
    letter-spacing: 0.2em;
    filter: invert(1);
}

.log {
    font-size: 10px;
    color: #333;
    border-left: 1px solid #111;
    padding-left: 10px;
    overflow-y: auto;
}

.badge {
    font-size: 9px;
    opacity: 0.4;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div class="max-w-6xl w-full grid grid-cols-12 gap-4">

    <div class="col-span-12 flex justify-between border-b border-zinc-900 pb-4">
        <h1 class="text-white tracking-[0.8em] text-xl font-bold">SHADOW_KERNEL_X</h1>
        <div class="badge">ENCRYPTION_ENGINE // AES-256</div>
    </div>

    <div class="col-span-12 lg:col-span-9 panel rounded-3xl p-6 h-[520px] flex flex-col">
        <textarea id="input" class="flex-grow w-full" placeholder="[INPUT OR ENCRYPTED HTML]"></textarea>
    </div>

    <div class="col-span-12 lg:col-span-3 flex flex-col gap-4">

        <div class="panel rounded-3xl p-6 flex flex-col gap-4">
            <div class="badge mb-4">COMMAND_CENTER</div>

            <button onclick="encrypt()" class="btn py-5 rounded-xl text-[11px] uppercase">Compile</button>
            <button onclick="decrypt()" class="btn py-5 rounded-xl text-[11px] uppercase">Decompile</button>
        </div>

        <div id="log" class="panel rounded-3xl p-4 h-40 log">
            SYSTEM_READY...<br>
        </div>
    </div>

</div>

<script>
const enc = new TextEncoder();
const dec = new TextDecoder();

const log = (t,type="info") => {
    const el = document.getElementById("log");
    const color = type==="err" ? "#ff4444" : type==="ok" ? "#44ff44" : "#555";
    el.innerHTML = `<span style="color:${color}">> ${t}</span><br>` + el.innerHTML;
};

// 混淆轉換函數
const s = (u) => Array.from(u).map(b => String.fromCharCode(b + 0x0800)).join('');
const u = (s) => new Uint8Array([...s].map(c => c.charCodeAt(0) - 0x0800));

/* ================= ENCRYPT ================= */
async function encrypt(){
    const raw = document.getElementById('input').value;
    if(!raw) return log("NULL_INPUT","err");

    log("BUILDING_ENCRYPTED_SHELL...");

    try {
        const k = await crypto.subtle.generateKey({name:"AES-GCM",length:256},true,["encrypt","decrypt"]);
        const iv = crypto.getRandomValues(new Uint8Array(12));

        // 將原始內容包裹在可執行的 Shell 中
        const shell = `(function(){document.open();document.write(\`${raw.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`);document.close();})();`;

        const d = await crypto.subtle.encrypt({name:"AES-GCM",iv},k,enc.encode(shell));
        const xk = await crypto.subtle.exportKey("raw",k);

        const res = `<!DOCTYPE html><html><body><script>
(async()=>{
const d=(s)=>new Uint8Array([...s].map(c=>c.charCodeAt(0)-0x0800));
const k=d("${s(new Uint8Array(xk))}");
const i=d("${s(iv)}");
const dt=d("${s(new Uint8Array(d))}");
const sk=await crypto.subtle.importKey("raw",k,"AES-GCM",false,["decrypt"]);
const r=await crypto.subtle.decrypt({name:"AES-GCM",iv:i},sk,dt);
new Function(new TextDecoder().decode(r))();
})();
<\/script></body></html>`;

        document.getElementById("input").value = res;
        navigator.clipboard.writeText(res);
        log("ENCRYPT_SUCCESS","ok");
        log("COPIED_TO_CLIPBOARD");

    } catch(e) {
        console.error(e);
        log("ENCRYPT_FAIL","err");
    }
}

/* ================= DECRYPT ================= */
async function decrypt(){
    const input = document.getElementById('input').value;

    if(!input.includes("crypto.subtle")) {
        return log("NOT_VALID_ENCRYPTED_FILE","err");
    }

    log("START_DECRYPT...");

    try {
        // 使用更寬鬆的正則表達式來匹配被格式化後的字串
        const get = (key) => {
            const regex = new RegExp(key + '=d\\("([^"]+)"\\)');
            const match = input.match(regex);
            return match ? match[1] : null;
        };

        const keyStr = get('const k');
        const ivStr = get('const i');
        const dataStr = get('const dt');

        if(!keyStr || !ivStr || !dataStr) return log("PARSE_FAIL (MISSING_DATA)","err");

        const kBuf = u(keyStr);
        const ivBuf = u(ivStr);
        const dBuf = u(dataStr);

        const sk = await crypto.subtle.importKey("raw", kBuf, "AES-GCM", false, ["decrypt"]);
        const decryptedBuffer = await crypto.subtle.decrypt({name:"AES-GCM", iv: ivBuf}, sk, dBuf);

        let decoded = dec.decode(decryptedBuffer);

        // 還原還原：移除 Shell 包裝還原原始 HTML
        // 匹配 (function(){document.open();document.write(` ... `);document.close();})();
        const shellMatch = decoded.match(/document\.write\(`([\s\S]*)`\);/);
        if (shellMatch && shellMatch[1]) {
            decoded = shellMatch[1]
                .replace(/\\`/g, '`')
                .replace(/\\\\\$/g, '$')
                .replace(/\\\\\\/g, '\\'); 
        }

        document.getElementById("input").value = decoded;
        log("DECRYPT_SUCCESS","ok");

    } catch(e) {
        console.error(e);
        log("DECRYPT_FAIL (INVALID_KEY_OR_DATA)","err");
    }
}
</script>

</body>
</html>
